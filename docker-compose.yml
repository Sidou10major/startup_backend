version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: startup_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: startup_db
      MYSQL_USER: startup_user
      MYSQL_PASSWORD: startup_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: